services:
  mysql:
    image: mysql:8.0
    container_name: oficina_ai_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: oficina_ai
      MYSQL_USER: oficina_user
      MYSQL_PASSWORD: oficina_pass
      MYSQL_ROOT_PASSWORD: root_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot_pass"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: oficina_ai_app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: mysql+pymysql://oficina_user:oficina_pass@mysql:3306/oficina_ai
    ports:
      - "5000:5000"
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
